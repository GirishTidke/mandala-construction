<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Test Hamburger</title>
<style>
body { margin: 0; font-family: Arial, sans-serif; }
nav { background: #063231; padding: 20px; display: flex; justify-content: space-between; align-items: center; }
.logo { color: white; font-size: 20px; font-weight: bold; }
.mobile-toggle { display: flex; flex-direction: column; gap: 5px; background: none; border: none; cursor: pointer; padding: 8px; }
.mobile-toggle span { display: block; width: 24px; height: 2px; background: white; transition: all 0.3s; }
.mobile-toggle.open span:nth-child(1) { transform: translateY(7px) rotate(45deg); }
.mobile-toggle.open span:nth-child(2) { opacity: 0; }
.mobile-toggle.open span:nth-child(3) { transform: translateY(-7px) rotate(-45deg); }
.mobile-nav { position: fixed; inset: 0; background: #063231; z-index: 600; padding: 100px 24px; transform: translateX(100%); transition: transform 0.35s; display: flex; flex-direction: column; gap: 8px; }
.mobile-nav.open { transform: translateX(0); }
.mobile-nav a { color: white; text-decoration: none; padding: 16px 24px; text-align: center; border-radius: 8px; font-weight: 600; }
.mobile-nav a:hover { background: rgba(255,255,255,0.1); }
</style>
</head>
<body>
<nav>
  <div class="logo">The Mandala</div>
  <button class="mobile-toggle" id="toggle">
    <span></span><span></span><span></span>
  </button>
</nav>

<div class="mobile-nav" id="menu">
  <a href="#">Home</a>
  <a href="#">About</a>
  <a href="#">Services</a>
  <a href="#">Projects</a>
  <a href="#">Blog</a>
  <a href="#">Contact</a>
</div>

<script>
const toggle = document.getElementById('toggle');
const menu = document.getElementById('menu');

toggle.addEventListener('click', function() {
  console.log('Clicked!');
  toggle.classList.toggle('open');
  menu.classList.toggle('open');
});

menu.querySelectorAll('a').forEach(link => {
  link.addEventListener('click', function() {
    toggle.classList.remove('open');
    menu.classList.remove('open');
  });
});
</script>
</body>
</html>
