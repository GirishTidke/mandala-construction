<div class="modal-overlay" id="enquiryModal">
  <div class="modal-box">
    <button class="modal-close" type="button" data-close-enquiry aria-label="Close enquiry form">
      <svg viewBox="0 0 24 24"><path d="M18 6L6 18M6 6l12 12" stroke-linecap="round"/></svg>
    </button>
    <h3>Let's Talk About Your Project</h3>
    <p class="modal-sub">Fill in the contact form and our team will get back to you within 24 hours.</p>
    <form id="enquiryForm">
      <div class="form-grid-2">
        <div class="form-group">
          <label>First Name <span class="form-required">*</span></label>
          <input type="text" name="fname" placeholder="Rahul" required>
        </div>
        <div class="form-group">
          <label>Last Name</label>
          <input type="text" name="lname" placeholder="Sharma">
        </div>
      </div>
      <div class="form-group">
        <label>Phone Number <span class="form-required">*</span></label>
        <input type="tel" name="phone" placeholder="+91 98765 43210" required>
      </div>
      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="you@email.com">
      </div>
      <div class="form-group">
        <label>Service Required <span class="form-required">*</span></label>
        <select name="service" required>
          <option value="">Select a service...</option>
          <option>Residential Construction</option>
          <option>Commercial Buildings</option>
          <option>Renovation & Remodeling</option>
          <option>Interior Design</option>
          <option>Structural Consultation</option>
          <option>Other / General Enquiry</option>
        </select>
      </div>
      <div class="form-group">
        <label>Project Budget (approx.)</label>
        <select name="budget">
          <option value="">Select a range...</option>
          <option>Under &#8377;25 Lakh</option>
          <option>&#8377;25L - &#8377;50L</option>
          <option>&#8377;50L - &#8377;1 Crore</option>
          <option>&#8377;1 Crore - &#8377;5 Crore</option>
          <option>Above &#8377;5 Crore</option>
          <option>Not sure yet</option>
        </select>
      </div>
      <div class="form-group">
        <label>Your Message <span class="form-required">*</span></label>
        <textarea name="message" placeholder="Tell us about your project, location, timeline..." required></textarea>
      </div>
      <button type="submit" class="submit-btn" id="enquirySubmitBtn">Send Message -></button>
    </form>
  </div>
</div>
